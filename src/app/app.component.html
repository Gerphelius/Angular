<app-header (currentSelection)="changeStateOf($event)"></app-header>

<app-all-recipes *ngIf='currentSelection === "all-recipes" || currentSelection === "default"'></app-all-recipes>

<app-favorites *ngIf='currentSelection === "favorites"'></app-favorites>

<app-purchases *ngIf='currentSelection === "purchases"'></app-purchases>
