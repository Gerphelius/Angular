<div id="purchases-form">
  <label for='title'>Title</label>
  <input #title type="text" id="title" maxlength="35" [value]=" curRecipeObj.title || '' ">
  <span class="alertMsg" *ngIf='isRecipeExist'>This recipe already exists</span>
  
  <label for="description">Description</label>
  <textarea #descr id="description" cols="30" rows="10" [value]=" curRecipeObj.description || '' "></textarea>

  <label for="photoUrl">Photo URL</label>
  <input #url type="url" id="photoUrl" [value]=" curRecipeObj.photoUrl || '' ">

  <label for="instructions">Instructions</label>
  <textarea #instr id="instructions" cols="30" rows="10" [value]=" curRecipeObj.instructions || '' "></textarea>

  <div [ngSwitch]="btnName">
    <button 
      (click)='addNewRecipe(title.value, descr.value, url.value, instr.value)' 
      *ngSwitchCase="'Add recipe'"
      routerLink="all-recipes">
      {{ btnName }}
    </button>
    <button 
      (click)='editRecipe(curRecipeObj, title.value, descr.value, url.value, instr.value)' 
      *ngSwitchCase="'Edit recipe'"
      routerLink="all-recipes">
      {{ btnName }}
    </button>
    <button *ngSwitchDefault>Make error</button>
  </div>
</div>
